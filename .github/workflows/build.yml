# $schema: https://json.schemastore.org/github-workflow.json

name: "_ Build _"


on:
  workflow_call:
    outputs:
      result_val:
        description: "The output value"
        value: ${{ jobs.build.outputs.files }}


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: go.work.sum

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: false

      - name: Run build script
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export HY_APP_PLATFORMS=$(sed 's/\r$//' platforms.txt | awk '!/^#/ && !/^$/' | paste -sd ",")
          uv run hyperbole.py build -r

      - name: Generate digests
        run: |
          for file in build/*; do
            sha256sum $file >> build/digests.txt
          done

      - name: Set short git commit SHA
        id: commit-id
        run: echo "val=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Upload build directory
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ steps.commit-id.outputs.val }}
          path: build/

      - name: List build files
        id: list-files
        run: |
          echo files=$(ls -1 build/ | jq -R -s -c 'split("\n") | map(select(length > 0))') >> $GITHUB_OUTPUT
