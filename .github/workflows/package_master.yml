# $schema: https://json.schemastore.org/github-workflow.json

name: "Package master Branch"


on:
  workflow_run:
    workflows: [Check]
    types: [completed]
    branches: master


concurrency:
  group: check-build-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    uses: ./.github/workflows/build.yml

  docker:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    needs: build
    uses: ./.github/workflows/docker.yml
    with:
      version-tag: next
